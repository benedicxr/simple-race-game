<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/main.js" defer></script>
    <title>Neon Racing</title>
</head>
<body>
    <div class="game-wrapper">
        <h1>Race 2026</h1>
        
        <div id="scoreboard">
            <div class="score-item">Car 1: <span id="score-car1">0</span></div>
            <div class="score-item">Car 2: <span id="score-car2">0</span></div>
            <div class="score-item">Car 3: <span id="score-car3">0</span></div>
        </div>

        <div class="settings-panel">
            <div class="input-group">
                <label>Number of cars:</label>
                <input type="number" id="car-count" min="2" max="8" value="3">
            </div>
            <div id="color-pickers" class="color-grid"></div>
            <button id="apply-settings" class="btn">Apply</button>
        </div>

        <div id="game-container">
            <div class="finish-line"></div>
            <div class="car" id="car1"><span>🏎️</span></div>
            <div class="car" id="car2"><span>🏎️</span></div>
            <div class="car" id="car3"><span>🏎️</span></div>
        </div>

        <div class="betting-panel">
            <h3>Your balance: <span id="balance-display">1000</span>$</h3>
            <select id="bet-car-select">
                <option value="">Choose car</option>
            </select>
            <input type="number" id="bet-amount" placeholder="Bet" min="0">
        </div>

        <div class="controls">
            <button id="start-button" class="btn btn-start">Start Race</button>
            <button id="reset-button" class="btn btn-reset">Reset</button>
        </div>
    </div>
</body>
</html>
